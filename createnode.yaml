- name: Build the nodes
  hosts: nodes
  gather_facts: no

  tasks:
    - name: Create compute node
      netactuate.compute.node:
        auth_token: "{{ auth_token }}"
        hostname: "{{ inventory_hostname }}"
        ssh_public_key: "{{ ssh_public_key }}"
        operating_system: "{{ operating_system }}"
        location: "{{ location }}"
        plan: "{{ plan }}"
        mbpkgid: "{{ mbpkgid | default(omit) }}"
        state: running
        unique: true
        package_billing: "{{ 'usage' if contract_id is defined else 'package' }}"
        contract_id: "{{ contract_id | default(omit) }}"
      delegate_to: localhost
      register: na

    - name: Wait for port 22 to be reachable
      ansible.builtin.wait_for:
        port: 22
        host: "{{ na.device.public_ipv4 }}"
        search_regex: OpenSSH
        sleep: 10
        connect_timeout: 5
      retries: 10
      delegate_to: localhost

    - name: Initialize node configuration
      ansible.builtin.set_fact:
        nodesetup: {}
      when: nodesetup is not defined

    - name: Set SSH IP
      ansible.builtin.set_fact:
        ansible_ssh_host: "{{ na.device.public_ipv4 }}"

    - name: Update node vars
      ansible.builtin.template:
        src: nodevars.yml
        dest: "./host_vars/{{ inventory_hostname }}"
      delegate_to: localhost

    - name: Wait for ubuntu login to become available
      ansible.builtin.shell: |
        for i in $(seq 1 30); do
          ssh {{ ansible_ssh_extra_args | default('') }} -o ConnectTimeout=5 -o BatchMode=yes \
            {% if ansible_ssh_private_key_file is defined %}-i {{ ansible_ssh_private_key_file }}{% endif %} \
            ubuntu@{{ na.device.public_ipv4 }} "echo ready" 2>/dev/null && exit 0
          sleep 10
        done
        exit 1
      delegate_to: localhost
      changed_when: false

- name: Configure nodes
  hosts: nodes
  remote_user: ubuntu
  become: true
  gather_facts: yes
  roles:
    - role: ssh
      tags: ssh
    - role: base
      tags: base
